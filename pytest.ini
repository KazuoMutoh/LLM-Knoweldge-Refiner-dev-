[pytest]
testpaths = tests
addopts = -ra --basetemp=tmp/pytest-of-root

# Keep tmp_path fixture directories so users can inspect artifacts.
tmp_path_retention_policy = all

# Show logs in console during test runs.
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s %(levelname)s %(name)s: %(message)s
log_cli_date_format = %H:%M:%S
